site_name: Smello
site_url: https://smello.io
site_description: Capture outgoing HTTP requests from your Python code and browse them in a local web dashboard.
repo_url: https://github.com/smelloscope/smello
repo_name: smelloscope/smello

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.footer

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/smelloscope/smello
      name: Source on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/smello/
      name: Client SDK on PyPI

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - API: api.md
  - Keyboard Shortcuts: keyboard-shortcuts.md
  - AI Skills: ai-skills.md
  - Changelog: changelog.md
  - Guides:
    - guides/index.md
    - guides/debug-requests.md
    - guides/debug-httpx.md
    - guides/debug-aiohttp.md
    - guides/debug-grpc.md
    - guides/debug-boto3.md
    - guides/debug-google-cloud.md
    - guides/debug-openai.md
    - guides/debug-anthropic.md
    - guides/debug-stripe.md
    - guides/debug-fastapi.md
    - guides/debug-django.md
